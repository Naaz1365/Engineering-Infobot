<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Enquiry Chatbot</title>
  <!--This imports Bootstrap CSS from a Content Delivery Network (CDN).-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--mx-auto centers the container horizontally and mt-5 adds top margin for the container -->
  <div class="chat-container mx-auto mt-5" style="max-width: 600px; border: 1px solid #ccc; border-radius: 10px;">

    <!--header of the chatbot with blue background and white text with paddng 3-->
    <div class="chat-header bg-primary text-white text-center p-3 rounded-top">
      <h4>🎓 Engineering-InfoBot</h4>
    </div>
    <!--the chat area where the user gives input with scrollbar(overflow-y)-->
    <div id="chat-box" class="chat-box p-3" style="height: 400px; overflow-y: auto;"></div>
    <div class="input-area d-flex p-2 border-top">
      <input type="text" id="user-input" class="form-control me-2" placeholder="Type your answer..." />
      <button id="send-btn" class="btn btn-primary">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
